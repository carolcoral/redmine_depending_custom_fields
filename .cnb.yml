# 手动触发：将代码推送到 GitHub
$:
  web_trigger_push_github:
    - name: push-to-github
      docker:
        image: docker.io/alpine/git:latest
      imports:
        # 密钥仓库需包含 GITHUB_TOKEN（Personal Access Token，需 repo 权限）
        # 请根据实际密钥仓库路径修改此 URL
        - https://cnb.cool/xindu.site/secret/-/blob/main/token.yaml
      stages:
        - name: push to GitHub
          script: |
            git config --global user.email "cnb-ci@cnb.cool"
            git config --global user.name "CNB CI"
            git remote add github https://x-access-token:${GITHUB_TOKEN}@github.com/carolcoral/redmine_depending_custom_fields.git
            git push github --all --force
            git push github --tags --force
